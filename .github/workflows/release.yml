name: Release specification

on:
  push:
    tags:
      - "v*-draft"
      - "v*-rc.*"
      - "v*.*.*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: specification-release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: python tests/validate.py
      - run: python tests/validate_links.py
      - run: python tests/validate_release.py "$GITHUB_REF_NAME"
      - name: Build release archives
        run: |
          version="${GITHUB_REF_NAME#v}"
          archive="nanomarkup.spec-${version}"
          mkdir dist
          git archive --format=tar --prefix="${archive}/" "$GITHUB_REF_NAME" | gzip -n > "dist/${archive}.tar.gz"
          git archive --format=zip --prefix="${archive}/" -o "dist/${archive}.zip" "$GITHUB_REF_NAME"
          cd dist
          sha256sum "${archive}.tar.gz" "${archive}.zip" > SHA256SUMS
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" dist/* \
            --verify-tag --notes-file "releases/${version}.md" \
            --title "Nano Markup ${version}"
